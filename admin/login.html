<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Gomantak Gausevak Mahasang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d7a3e',
                        dark: '#1e5a2b',
                        accent: '#d4a017',
                        text: '#333333',
                        light: '#f5f5f5',
                    },
                    fontFamily: { inter: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #2d7a3e 0%, #1e5a2b 100%); }
    </style>
</head>
<body class="bg-light font-inter text-text antialiased min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4 text-white font-bold text-2xl">GG</div>
                <h1 class="text-2xl font-bold text-text">Admin Login</h1>
                <p class="text-gray-500 text-sm mt-1">Gomantak Gausevak Mahasang</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="username" class="w-full border-2 border-gray-200 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:outline-none transition-colors" placeholder="Enter username" value="admin">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="password" class="w-full border-2 border-gray-200 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:outline-none transition-colors" placeholder="Enter password" value="admin123">
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary">
                        <span class="text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-primary hover:text-dark font-medium">Forgot password?</a>
                </div>
                <button type="submit" class="w-full bg-primary hover:bg-dark text-white py-3.5 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>

            <div class="mt-6 p-4 bg-yellow-50 rounded-xl border border-yellow-200">
                <p class="text-sm text-yellow-800">
                    <i class="fas fa-info-circle mr-1"></i>
                    <strong>Demo Credentials:</strong><br>
                    Username: <code class="bg-white px-2 py-0.5 rounded font-mono">admin</code><br>
                    Password: <code class="bg-white px-2 py-0.5 rounded font-mono">admin123</code>
                </p>
            </div>

            <div class="mt-6 text-center">
                <a href="../index.html" class="text-gray-500 hover:text-primary text-sm transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Website
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('gg_admin_logged_in', 'true');
                localStorage.setItem('gg_admin_login_time', new Date().toISOString());
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid credentials. Please use admin/admin123');
            }
        });
    </script>
</body>
</html>
